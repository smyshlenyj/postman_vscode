info:
  name: Получить количество уведомлений во входящей очереди
  type: http
  seq: 4

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/getWebhooksCount/{{apiTokenInstance}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: getWebhooksCount
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/getWebhooksCount/{{apiTokenInstance}}"
      method: VIEW
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Mon, 20 Apr 2020 19:50:48 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "321"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
              "count": 0
          }

