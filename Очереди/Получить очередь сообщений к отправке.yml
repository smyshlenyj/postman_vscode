info:
  name: Получить очередь сообщений к отправке
  type: http
  seq: 2

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/showMessagesQueue/{{apiTokenInstance}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: showMessagesQueue
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/showMessagesQueue/{{apiTokenInstance}}"
      method: VIEW
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Mon, 20 Apr 2020 19:50:48 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "321"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          [
              {
                  "messageID": "2755123731234",
                  "type": "sendMessage",
                  "body": {
                      "chatId": "100000001",
                      "message": "Я использую GREEN-API для отправки этого сообщения!",
                      "linkPreview": false
                  }
              }
          ]

docs: Документация [ShowMessagesQueue](https://green-api.com/v3/docs/api/queues/ShowMessagesQueue/)
