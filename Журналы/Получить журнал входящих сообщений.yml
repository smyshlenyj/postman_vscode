info:
  name: Получить журнал входящих сообщений
  type: http
  seq: 3

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/lastIncomingMessages/{{apiTokenInstance}}?minutes=1440"
  params:
    - name: minutes
      value: "1440"
      type: query
      description: Время в минутах
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: lastIncomingMessages
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/lastIncomingMessages/{{apiTokenInstance}}?minutes=1440"
      method: VIEW
      params:
        - name: minutes
          value: "1440"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Mon, 20 Apr 2020 19:57:39 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "1643"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          [
              {
                  "type": "incoming",
                  "idMessage": "126543123451133331119",
                  "timestamp": 1706522263,
                  "typeMessage": "textMessage",
                  "chatId": "100000001",
                  "textMessage": "Я использую GREEN-API для отправки этого сообщения!",
                  "senderId": "100000001",
                  "senderName": "Ходабрыш Пробешёлов",
                  "senderContactName": "Ходабрыш Пробешёлов",
                  "deletedMessageId": "",
                  "editedMessageId": "",
                  "isEdited": false,
                  "isDeleted": false
              }
          ]

