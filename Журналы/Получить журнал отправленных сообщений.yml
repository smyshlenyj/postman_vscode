info:
  name: Получить журнал отправленных сообщений
  type: http
  seq: 4

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/lastOutgoingMessages/{{apiTokenInstance}}?minutes=1440"
  params:
    - name: minutes
      value: "1440"
      type: query
      description: Время в минутах
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: lastOutgoingMessages
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/lastOutgoingMessages/{{apiTokenInstance}}?minutes=1440"
      method: VIEW
      params:
        - name: minutes
          value: "1440"
          type: query
          description: Время в минутах
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Mon, 20 Apr 2020 20:01:05 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "2900"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          [
              {
                  "type": "outgoing",
                  "idMessage": "2712345112345",
                  "timestamp": 1706761225,
                  "typeMessage": "textMessage",
                  "chatId": "100000001",
                  "textMessage": "Я использую GREEN-API для отправки этого сообщения!",
                  "statusMessage": "sent",
                  "sendByApi": false,
                  "deletedMessageId": "",
                  "editedMessageId": "",
                  "isEdited": false,
                  "isDeleted": false
              }
          ]

docs: Документация [LastOutgoingMessages](https://green-api.com/v3/docs/api/journals/LastOutgoingMessages/)
