info:
  name: Получить историю сообщений чата
  type: http
  seq: 1

http:
  method: POST
  url: "{{apiUrl}}/waInstance{{idInstance}}/getChatHistory/{{apiTokenInstance}}"
  body:
    type: json
    data: "{\r

      \t\"chatId\": \"100000001\",\r

      \t\"count\": 1\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

