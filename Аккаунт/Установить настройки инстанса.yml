info:
  name: Установить настройки инстанса
  type: http
  seq: 6

http:
  method: POST
  url: "{{apiUrl}}/waInstance{{idInstance}}/setSettings/{{apiTokenInstance}}"
  body:
    type: json
    data: "{\r

      \    \"webhookUrl\": \"\",\r

      \    \"webhookUrlToken\": \"\",\r

      \    \"delaySendMessagesMilliseconds\": 0,\r

      \    \"markIncomingMessagesReaded\": \"no\",\r

      \    \"markIncomingMessagesReadedOnReply\": \"no\",\r

      \    \"outgoingWebhook\": \"no\",\r

      \    \"outgoingMessageWebhook\": \"no\",\r

      \    \"outgoingAPIMessageWebhook\": \"no\",\r

      \    \"incomingWebhook\": \"no\",\r

      \    \"editedMessageWebhook\": \"no\",\r

      \    \"deletedMessageWebhook\": \"no\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: setSettings (true)
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/setSettings/{{apiTokenInstance}}"
      method: VIEW
      body:
        type: json
        data: "{\r

          \    \"webhookUrl\": \"\",\r

          \    \"webhookUrlToken\": \"\",\r

          \    \"delaySendMessagesMilliseconds\": 0,\r

          \    \"markIncomingMessagesReaded\": \"no\",\r

          \    \"markIncomingMessagesReadedOnReply\": \"no\",\r

          \    \"outgoingWebhook\": \"no\",\r

          \    \"outgoingMessageWebhook\": \"no\",\r

          \    \"outgoingAPIMessageWebhook\": \"no\",\r

          \    \"incomingWebhook\": \"no\"\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Tue, 21 Apr 2020 13:16:18 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "26"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
              "saveSettings": true
          }
  - name: setSettings (false)
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/setSettings/{{apiTokenInstance}}"
      method: VIEW
      body:
        type: json
        data: "{\r

          \    \"webhookUrl\": \"\",\r

          \    \"webhookUrlToken\": \"\",\r

          \    \"delaySendMessagesMilliseconds\": 0,\r

          \    \"markIncomingMessagesReaded\": \"no\",\r

          \    \"markIncomingMessagesReadedOnReply\": \"no\",\r

          \    \"outgoingWebhook\": \"no\",\r

          \    \"outgoingMessageWebhook\": \"no\",\r

          \    \"outgoingAPIMessageWebhook\": \"no\",\r

          \    \"incomingWebhook\": \"no\"\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Tue, 21 Apr 2020 13:16:18 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "26"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
              "saveSettings": false
          }

