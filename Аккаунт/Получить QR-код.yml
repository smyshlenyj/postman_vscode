info:
  name: Получить QR-код
  type: http
  seq: 5

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/qr/{{apiTokenInstance}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: qr
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/qr/{{apiTokenInstance}}"
      method: VIEW
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "type": "qrCode",
              "message": ""
          }

docs: Документация [QR](https://green-api.com/v3/docs/api/account/QR/)
