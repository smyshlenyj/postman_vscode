info:
  name: Установить фото профиля
  type: http
  seq: 7

http:
  method: POST
  url: "{{apiUrl}}/waInstance{{idInstance}}/setProfilePicture/{{apiTokenInstance}}"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - /C:/avatar.jpg
        description: Sent file in *.jpg or *.webp
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: setProfilePicture
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/setProfilePicture/{{apiTokenInstance}}"
      method: VIEW
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value:
              - /C:/avatar.jpg
            description: Sent file in *.jpg
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Tue, 21 Apr 2020 13:16:18 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "26"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
              "reason": "",
          	"urlAvatar": "https://i.oneme.ru/i?r=BTE2sh_eZW7g8kugOdIm2NotBPGJiDHPpKQP3fE_vh2BE1holGE_adbUwUqCIPQgiOI",
          	"setProfilePicture": true
          }
  - name: setProfilePicture (File is empty)
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/setProfilePicture/{{apiTokenInstance}}"
      method: VIEW
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value: []
            description: Sent file in *.jpg
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Tue, 21 Apr 2020 13:16:18 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "26"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: File is empty
  - name: setProfilePicture (Unsupported media type)
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/setProfilePicture/{{apiTokenInstance}}"
      method: VIEW
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value:
              - /C:/horse.wav
            description: Sent file in *.jpg
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Tue, 21 Apr 2020 13:16:18 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "26"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: Unsupported media type

