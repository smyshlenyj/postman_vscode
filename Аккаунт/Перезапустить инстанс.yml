info:
  name: Перезапустить инстанс
  type: http
  seq: 3

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/reboot/{{apiTokenInstance}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: reboot
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/reboot/{{apiTokenInstance}}"
      method: VIEW
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Fri, 17 Apr 2020 14:29:41 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "22"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
              "isReboot": true
          }

docs: Документация [Reboot](https://green-api.com/v3/docs/api/account/Reboot/)
