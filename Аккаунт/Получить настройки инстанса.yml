info:
  name: Получить настройки инстанса
  type: http
  seq: 2

http:
  method: GET
  url: "{{apiUrl}}/waInstance{{idInstance}}/getSettings/{{apiTokenInstance}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: getSettings
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/getSettings/{{apiTokenInstance}}"
      method: VIEW
      headers:
        - name: Cache-Control
          value: no-cache
        - name: Postman-Token
          value: <calculated when request is sent>
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: <calculated when request is sent>
        - name: Accept
          value: "*/*"
        - name: Accept-Encoding
          value: gzip, deflate, br
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Mon, 20 Apr 2020 19:48:22 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "85"
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |
          
          {
              "wid": "79991234567@c.us",
              "typeInstance": "v3",
              "webhookUrl": "",
              "webhookUrlToken": "",
              "delaySendMessagesMilliseconds": 0,
              "markIncomingMessagesReaded": "no",
              "markIncomingMessagesReadedOnReply": "no",
              "proxyInstance": "system proxy",
              "outgoingWebhook": "no",
              "outgoingMessageWebhook": "no",
              "outgoingAPIMessageWebhook": "no",
              "incomingWebhook": "no",
              "editedMessageWebhook": "no",
              "deletedMessageWebhook": "no"
          }

