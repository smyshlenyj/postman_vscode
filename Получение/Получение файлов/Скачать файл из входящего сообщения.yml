info:
  name: Скачать файл из входящего сообщения
  type: http
  seq: 1

http:
  method: POST
  url: "{{apiUrl}}/waInstance{{idInstance}}/downloadFile/{{apiTokenInstance}}"
  body:
    type: json
    data: "{\r

      \t\"chatId\": \"10000000\",\r

      \    \"idMessage\": \"2712345112345\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

