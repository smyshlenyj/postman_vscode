docs: |-
  Документация [Отправленное с телефона сообщение](https://green-api.com/v3/docs/api/receiving/notifications-format/outgoing-message/OutgoingMessage/)

  Для получения данного типа уведомления необходимо включить настройки в личном кабинете или методом [SetSettings](https://green-api.com/v3/docs/api/account/SetSettings/):  
  "outgoingMessageWebhook": "yes"

  В текущей версии MAX не существует отдельного типа для аудио. Сообщения с аудио обрабатываются как документ.
