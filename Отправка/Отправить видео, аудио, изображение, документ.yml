info:
  name: Отправить видео, аудио, изображение, документ
  type: http
  seq: 5

http:
  method: POST
  url: "{{mediaUrl}}/waInstance{{idInstance}}/sendFileByUpload/{{apiTokenInstance}}"
  headers:
    - name: User-Agent
      value: GREEN-API_POSTMAN/1.0
  body:
    type: multipart-form
    data:
      - name: chatId
        type: text
        value: "10000000"
        description: Идентификатор чата
      - name: caption
        type: text
        value: Description
        description: Описание под файлом
        disabled: true
      - name: file
        type: file
        value:
          - /C:/horse.png
        description: Отправляемый файл
      - name: fileName
        type: text
        value: horse.png
        description: Название файла
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
