  type: http
  seq: 6

http:
  method: POST
  url: "{{apiUrl}}/waInstance{{idInstance}}/sendFileByUrl/{{apiTokenInstance}}"
  headers:
    - name: User-Agent
      value: GREEN-API_POSTMAN/1.0
  body:
    type: json
    data: "{\r

      \    \"chatId\": \"10000000\",\r

      \t\"urlFile\": \"https://avatars.mds.yandex.net/get-pdb/477388/77f64197-87d2-42cf-9305-14f49c65f1da/s375\",\r

      \t\"fileName\": \"horse.png\",\r

      \t\"caption\": \"лошадка\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

