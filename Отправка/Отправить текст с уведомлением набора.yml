info:
  name: Отправить текст с уведомлением набора
  type: http
  seq: 4

http:
  method: POST
  url: "{{apiUrl}}/waInstance{{idInstance}}/sendMessage/{{apiTokenInstance}}"
  headers:
    - name: User-Agent
      value: GREEN-API_POSTMAN/1.0
  body:
    type: json
    data: "{\r

      \t\"chatId\": \"10000000\",\r

      \t\"message\": \"Я использую GREEN-API для отправки этого сообщения!\",\r

      \    \"typingTime\": 10000\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: sendMessage
    request:
      url: "{{apiUrl}}/waInstance{{idInstance}}/sendMessage/{{apiTokenInstance}}"
      method: VIEW
      body:
        type: json
        data: "{\r

          \t\"chatId\": \"10000000\",\r

          \t\"message\": \"Я использую GREEN-API для отправки этого сообщения!\",\r

          \    \"typingTime\": 10000\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Fri, 17 Apr 2020 13:14:58 GMT
        - name: Content-Type
